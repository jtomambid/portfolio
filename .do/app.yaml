name: portfolio
services:
  - name: web
    github:
      repo: jtomambid/portfolio
      branch: master
      deploy_on_push: false
    build_command: npm ci && npm run build
    run_command: npm start
    environment_slug: node-js
    instance_size_slug: basic-xxs
    instance_count: 1
    http_port: 8080
    envs:
      - key: NODE_VERSION
        value: "22"
